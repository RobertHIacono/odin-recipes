        <img src="imgs/Pajeon.jpg" class = "recipe-image" alt="Pajeon, a korean pancake">
        <figcaption>
            <span class = "image-description">Pajeon, a Korean pancake  </span>
            <small class = "image-credit">
                Photo: <a href = https://www.flickr.com/photos/gameimp/528169180/ target = "_blank" rel = "noopener noreferrer">Pajeon</a>

                <p>Pajeon, a savory pancake is made very simply by combining a generous amount of green onions, flour, water, and egg 
                    and frying the resulting batter. 
                </p>
                <h2>Ingredients</h2>
                <ul>
                    <li>Flour</li>
                    <li>An egg</li>
                    <li>Water</li>
                    <li>Green onions, chopped</li>
                </ul>
                <h2>Instructions</h2>
                <ol>  
                    <li>Mix flour, water, and egg in a bowl to make a batter.</li>
                    <li>Add chopped green onions to the batter and mix well.</li>
                    <li>Heat a pan over medium heat and add a little oil.</li>
                    <li>Pour the batter into the pan and spread it out evenly.</li>
                    <li>Cook until the bottom is golden brown, then flip and cook the other side until golden brown as well.</li>
                    <li>Remove from the pan and serve hot with dipping sauce.</li>
                </ol>
            </small>
        </figcaption>
    </figure>
